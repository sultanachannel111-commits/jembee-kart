name: Build Jembee Native APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js (Safe Logic Patch)
        run: |
          # API folder delete karein kyunki APK mein server nahi hota
          rm -rf src/app/api || true
          
          # SMART PATCH: Ye har page file mein dynamic flag dalega
          # Isse "missing generateStaticParams" error khatam ho jayega
          find src/app -name "page.tsx" -o -name "page.jsx" | while read file; do
            if grep -q '"use client"' "$file"; then
              # Agar "use client" hai, toh uske niche inject karein
              sed -i '/"use client"/a export const dynamic = "force-dynamic"; export const dynamicParams = true;' "$file"
            else
              # Agar nahi hai, toh file ke top par add karein
              sed -i '1i export const dynamic = "force-dynamic"; export const dynamicParams = true;' "$file"
            fi
          done
          
          npx next build
        env:
          GITHUB_ACTIONS: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync and Build APK
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Jembee com.jembee.app --web-dir out || true
          npx cap add android || true
          
          # Kotlin Library Conflict Fix
          cat <<EOF >> android/app/build.gradle
          configurations.all {
              resolutionStrategy {
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
              }
          }
          EOF
          
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jembee-Kart-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
