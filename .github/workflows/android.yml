name: Build Jembee Native APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js (Force Static Bypass)
        run: |
          # API folder hatayein kyunki APK mein server nahi chalta
          rm -rf src/app/api || true
          
          # [slug] aur dynamic folders ko build error se bachane ke liye patch
          # Ye aapka logic delete nahi karega, bas build pass karwayega
          find src/app -name "page.tsx" -o -name "page.jsx" | while read file; do
            if grep -q '"use client"' "$file"; then
              # "use client" ke baad dynamic flags add karna
              sed -i '/"use client"/a export const dynamic = "force-dynamic"; export const dynamicParams = true;' "$file"
            else
              # Normal page ke top par add karna
              sed -i '1i export const dynamic = "force-dynamic"; export const dynamicParams = true;' "$file"
            fi
          done
          
          npx next build
        env:
          GITHUB_ACTIONS: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync and Patch Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Jembee com.jembee.app --web-dir out || true
          npx cap add android || true
          
          # Kotlin duplicate error fix
          cat <<EOF >> android/app/build.gradle
          configurations.all {
              resolutionStrategy {
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
              }
          }
          EOF
          
          npx cap sync android

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jembee-Kart-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
