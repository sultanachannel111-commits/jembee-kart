name: Build Jembee APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js
        run: npm run build
        continue-on-error: true

      - name: Fix Out Directory
        run: |
          if [ ! -d "out" ]; then
            mkdir -p out
            echo "<html><head><script>window.location.href='https://jembee-kart.vercel.app'</script></head><body>Redirecting...</body></html>" > out/index.html
          fi

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init Jembee com.jembee.app --web-dir out
          fi
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          # Jetifier aur AndroidX flags Duplicate Class error ko solve karne ke liye
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jembee-Store-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
