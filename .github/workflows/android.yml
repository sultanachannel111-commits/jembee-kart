name: Build Jembee Native APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js (Smart Logic Preservation)
        run: |
          # 1. API folder ko delete karein (Kyunki APK mein server-side API nahi chalti)
          rm -rf src/app/api || true
          
          # 2. SMART PATCH: Har page.tsx ke upar dynamic flags add karna
          # Isse folders delete nahi honge, Next.js build ke waqt in pages ko skip karega
          # Taaki aapka product aur logic APK mein maujood rahe.
          find src/app -name "page.tsx" -o -name "page.jsx" | xargs sed -i '1i export const dynamic = "force-dynamic"; export const dynamicParams = true;' || true
          
          # 3. Next.js Build
          npx next build
        env:
          GITHUB_ACTIONS: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync and Patch Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # Capacitor init aur Android add
          npx cap init Jembee com.jembee.app --web-dir out || true
          npx cap add android || true
          
          # UI Improvement: Address bar hide karne ka native patch
          sed -i 's/<item name="android:windowNoTitle">false<\/item>/<item name="android:windowNoTitle">true<\/item>/' android/app/src/main/res/values/styles.xml || true
          
          # Kotlin duplicate class conflict fix
          cat <<EOF >> android/app/build.gradle
          configurations.all {
              resolutionStrategy {
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
              }
          }
          EOF
          
          npx cap sync android

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jembee-Full-Logic-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
