name: Build Jembee Native APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js (Force Static Bypass)
        run: |
          # 1. Server-only API folder delete karein
          rm -rf src/app/api || true
          
          # 2. Mazboot Patching Logic:
          # Hum har page file ko dhoondenge aur usme force-dynamic inject karenge
          # Taaki "generateStaticParams" ki zaroorat na pade
          for file in $(find src/app -name "page.tsx" -o -name "page.jsx"); do
            if grep -q '"use client"' "$file"; then
              # Agar file client component hai, toh "use client" ke baad add karein
              sed -i '/"use client"/a export const dynamic = "force-dynamic"; export const dynamicParams = true;' "$file"
            else
              # Agar client component nahi hai, toh file ke top par add karein
              sed -i '1i export const dynamic = "force-dynamic"; export const dynamicParams = true;' "$file"
            fi
          done
          
          # 3. Next Build run karein
          npx next build
        env:
          GITHUB_ACTIONS: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync and Patch Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Jembee com.jembee.app --web-dir out || true
          npx cap add android || true
          
          # UI: Status bar/Title bar hide karein
          sed -i 's/<item name="android:windowNoTitle">false<\/item>/<item name="android:windowNoTitle">true<\/item>/' android/app/src/main/res/values/styles.xml || true
          
          # Kotlin duplicate library fix
          cat <<EOF >> android/app/build.gradle
          configurations.all {
              resolutionStrategy {
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
              }
          }
          EOF
          
          npx cap sync android

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jembee-Final-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
