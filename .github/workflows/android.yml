name: Build Jembee APK Ultimate Fix

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js
        run: npm run build
        continue-on-error: true

      - name: Force Create Out Directory
        run: |
          # Agar Next.js export fail hua, toh hum khud empty files banayenge taaki Capacitor sync na ruke
          mkdir -p out
          if [ ! -f "out/index.html" ]; then
            echo "<html><head><script>window.location.href='https://jembee-kart.vercel.app'</script></head><body>Redirecting...</body></html>" > out/index.html
          fi

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor & Patch Gradle
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Jembee com.jembee.app --web-dir out || true
          npx cap add android || true
          
          # Duplicate Class fix: gradle file ke end mein resolution strategy joda
          cat <<EOF >> android/app/build.gradle
          configurations.all {
              resolutionStrategy {
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
              }
          }
          EOF
          
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jembee-Store-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
