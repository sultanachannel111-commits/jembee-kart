name: Build Jembee Native APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js (Safe Bypass Fix)
        run: |
          # 1. API folder hatayein
          rm -rf src/app/api || true
          
          # 2. SABSE IMPORTANT: Dynamic folders [slug] ko temporary fix karein
          # Ye un pages ko static hone se rokega taaki build error na de
          find src/app -name "page.tsx" -o -name "page.jsx" | while read file; do
            # Purane dynamic flags hatayein agar pehle se hain
            sed -i '/export const dynamic/d' "$file" || true
            sed -i '/export const dynamicParams/d' "$file" || true
            
            if grep -q '"use client"' "$file"; then
              # Client components mein niche add karein
              sed -i '/"use client"/a export const dynamic = "force-dynamic"; export const dynamicParams = true;' "$file"
            else
              # Server components ke top par add karein
              sed -i '1i export const dynamic = "force-dynamic"; export const dynamicParams = true;' "$file"
            fi
          done
          
          # 3. Next.js Build
          npx next build
        env:
          GITHUB_ACTIONS: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync and Build APK
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Jembee com.jembee.app --web-dir out || true
          npx cap add android || true
          
          # Android Library Conflicts Fix
          cat <<EOF >> android/app/build.gradle
          configurations.all {
              resolutionStrategy {
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
              }
          }
          EOF
          
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jembee-Kart-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
