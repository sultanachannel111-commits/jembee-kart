name: Build Jembee Native APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js (with Nuclear Cleanup)
        run: |
          # 1. Sabhi dynamic folders aur API ko delete karna jo build rokte hain
          rm -rf src/app/api || true
          rm -rf src/app/category || true
          rm -rf src/app/product || true
          rm -rf src/app/orders || true
          rm -rf src/app/payment || true
          rm -rf src/app/store || true
          rm -rf src/app/track || true
          rm -rf src/app/wish || true
          rm -rf src/app/order-success || true
          
          # 2. Kisi bhi bache huye [bracket] folder ko deeply dhoond kar delete karna
          find src/app -name "*[*]*" -exec rm -rf {} + || true
          
          # 3. Next.js Build command chalana
          npx next build
        env:
          GITHUB_ACTIONS: true

      - name: Prepare Out Folder
        run: |
          # Ensure out directory exists for Capacitor even if export is minimal
          if [ ! -d "out" ]; then
            mkdir -p out
            echo "<html><body>Jembee App Ready</body></html>" > out/index.html
          fi

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync and Patch Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # Capacitor initialize aur Android platform add karna
          npx cap init Jembee com.jembee.app --web-dir out || true
          npx cap add android || true
          
          # UI improvements: Address bar aur Title hide karna
          sed -i 's/<item name="android:windowNoTitle">false<\/item>/<item name="android:windowNoTitle">true<\/item>/' android/app/src/main/res/values/styles.xml || true
          
          # Kotlin duplicate class conflict fix
          cat <<EOF >> android/app/build.gradle
          configurations.all {
              resolutionStrategy {
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
              }
          }
          EOF
          
          npx cap sync android

      - name: Build Final Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jembee-Native-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
