name: Build Jembee APK Final Fix

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js
        run: npm run build
        continue-on-error: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor & Auto-Fix Gradle
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Jembee com.jembee.app --web-dir out || true
          npx cap add android || true
          
          # Ye command automatically Duplicate Class error ko fix karegi
          echo 'configurations.all { resolutionStrategy { exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"; exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7" } }' >> android/app/build.gradle
          
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jembee-Store-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
